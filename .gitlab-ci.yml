# ── Forest for the Trees — GitLab CI ─────────────────────────────────────────
# Controls when changes mirror to GitHub.
#
# Branch model (MVP+ phase):
#   main    → GitLab only (your working branch, never auto-mirrors)
#   beta    → auto-mirrors to GitHub 'beta' → Vercel deploys from beta (default branch)
#   stable  → mirrors to GitHub 'stable' branch, requires manual approval
#
# Required GitLab CI/CD variables (Settings → CI/CD → Variables):
#   GITHUB_TOKEN   — GitHub fine-grained PAT (Contents: read+write on forest-for-the-tree)
#   GITHUB_REPO    — dyndl/forest-for-the-tree

stages:
  - mirror

# ── Shared mirror script ──────────────────────────────────────────────────────
.mirror_base:
  stage: mirror
  before_script:
    - git config --global user.email "ci@forestforthetrees.app"
    - git config --global user.name "Forest CI"
    # Authenticate with GitHub token
    - git remote add github https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git || true

# ── Beta mirror — auto on every push to beta branch ──────────────────────────
mirror_beta:
  extends: .mirror_base
  rules:
    - if: '$CI_COMMIT_BRANCH == "beta"'
  script:
    - echo "Mirroring beta → GitHub beta (Vercel deploys from beta)..."
    - git push github HEAD:refs/heads/beta --force
    - echo "✓ GitHub beta updated (commit $CI_COMMIT_SHORT_SHA)"

# ── Stable mirror — manual trigger only, pushes to GitHub main ───────────────
mirror_stable:
  extends: .mirror_base
  rules:
    - if: '$CI_COMMIT_BRANCH == "stable"'
      when: manual   # ← requires a human to click "Run" in GitLab CI UI
  script:
    - echo "Mirroring stable → GitHub stable branch..."
    - git push github HEAD:refs/heads/stable --force
    - echo "✓ GitHub stable updated — approved release (commit $CI_COMMIT_SHORT_SHA)"
  environment:
    name: github-stable
    url: https://github.com/${GITHUB_REPO}
